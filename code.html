<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PLANOVA – Email Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    .verify-container {
      max-width: 420px;
      margin: 80px auto;
      padding: 30px;
      background: #111;
      border-radius: 12px;
      color: white;
      text-align: center;
      border: 1px solid #00ff88;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      text-align: center;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: white;
      letter-spacing: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #00ff88;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    .error {
      margin-top: 15px;
      color: #ff4444;
      font-size: 15px;
      display: none;
    }

    .success {
      margin-top: 15px;
      color: #00ff88;
      font-size: 15px;
      display: none;
    }
  </style>
</head>

<body>

<div class="verify-container">
  <h2>Email Verification</h2>
  <p>Enter the 6‑digit code sent to your email</p>

  <input type="text" id="codeInput" maxlength="6" placeholder="______" />

  <button id="sendBtn" class="btn">Send Code</button>

  <p id="errorMsg" class="error"></p>
  <p id="successMsg" class="success"></p>
</div>

<script>
let generatedCode = null;
let buttonMode = "send"; // "send" or "continue"

document.getElementById("sendBtn").addEventListener("click", async () => {
    const btn = document.getElementById("sendBtn");
    const error = document.getElementById("errorMsg");
    const success = document.getElementById("successMsg");

    error.style.display = "none";
    success.style.display = "none";

    if (buttonMode === "send") {
        // Ask backend to send the code
        const res = await fetch("/send_code", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: localStorage.getItem("pending_email") })
        });

        const data = await res.json();

        if (data.success) {
            generatedCode = data.code; // store the code from backend
            success.innerText = "Code sent! Check your email.";
            success.style.display = "block";

            btn.innerText = "Continue";
            buttonMode = "continue";
        } else {
            error.innerText = data.message;
            error.style.display = "block";
        }

    } else if (buttonMode === "continue") {
        const userCode = document.getElementById("codeInput").value.trim();

        // ✅ No code entered
        if (!userCode) {
            error.innerText = "Please enter a code to continue";
            error.style.display = "block";
            return;
        }

        // ✅ Must be 6 digits
        if (userCode.length !== 6) {
            error.innerText = "Code must be 6 digits";
            error.style.display = "block";
            return;
        }

        // ✅ Safety check
        if (!generatedCode) {
            error.innerText = "You must request a code first";
            error.style.display = "block";
            return;
        }

        // ✅ Incorrect code
        if (userCode !== generatedCode) {
            error.innerText = "Invalid Code, Please Try Again!";
            error.style.display = "block";
            return;
        }

        // ✅ SUCCESS
        success.innerText = "Code verified!";
        success.style.display = "block";

        try {
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    full_name: localStorage.getItem("pending_name"),
                    email: localStorage.getItem("pending_email"),
                    password: localStorage.getItem("pending_password")
                })
            });

            const data = await res.json();

            if (data.success) {
                success.innerText = "Account created successfully!";
                success.style.display = "block";

                // Clear temp data
                localStorage.removeItem("pending_name");
                localStorage.removeItem("pending_email");
                localStorage.removeItem("pending_password");

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1200);

            } else {
                error.innerText = data.message;
                error.style.display = "block";
            }

        } catch (err) {
            error.innerText = "Something went wrong. Please try again.";
            error.style.display = "block";
        }
    }
});
</script>

</body>
</html>
