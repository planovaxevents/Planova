<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PLANOVA – Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR (unchanged) */
    .nav-user-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #111;
      color: white;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.25s ease;
    }
    .nav-user-btn:hover {
      background: #00ff88;
      color: #000;
      transform: translateY(-2px);
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 7vw;
      background: rgba(3, 7, 18, 0.96);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(15, 23, 42, 0.9);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    .logo-mark {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #4ade80, #22c55e 40%, #16a34a 70%, #052e16 100%);
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.8);
    }

    /* ACCOUNT PAGE */
    .account-wrapper {
      max-width: 900px;
      margin: 80px auto;
      padding: 20px;
    }

    .account-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #00ff88;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
    }

    .edit-btn {
      padding: 10px 18px;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: 0.25s ease;
    }
    .edit-btn:hover {
      background: #00cc66;
      transform: translateY(-2px);
    }

    .section {
      background: #111;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 25px;
      border: 1px solid #00ff88;
      box-shadow: 0 0 20px rgba(0,255,136,0.15);
    }

    .section h3 {
      margin-bottom: 15px;
      font-size: 22px;
    }

    .info-row {
      margin: 8px 0;
      font-size: 18px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: 0.25s ease;
    }

    .btn-edit {
      background: #00ff88;
      color: #000;
    }
    .btn-edit:hover {
      background: #00cc66;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #ff3b3b;
      color: white;
      width: 100%;
      margin-top: 10px;
    }
    .btn-danger:hover {
      background: #ff6b6b;
      transform: translateY(-2px);
    }

    .btn-logout {
      background: #444;
      color: white;
      width: 100%;
      margin-top: 20px;
    }
    .btn-logout:hover {
      background: #666;
      transform: translateY(-2px);
    }

    /* MODALS */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      width: 350px;
      border: 1px solid #00ff88;
      box-shadow: 0 0 25px rgba(0,255,136,0.2);
      z-index: 10000;
      position: relative;
    }

    .modal input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    .modal button {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header class="nav">
  <div class="nav-left">
    <a href="index.html" class="logo">
      <span class="logo-mark">●</span> PLANOVA
    </a>
  </div>
  <div class="nav-right"></div>
</header>

<div class="account-wrapper">

  <!-- HEADER WITH EDIT BUTTON ON RIGHT -->
  <div class="account-header">
    <div class="header-left">
      <div class="avatar" id="avatar"></div>
      <div>
        <h2 id="acc-name"></h2>
        <p class="muted">Manage your PLANOVA profile</p>
      </div>
    </div>

   <button class="edit-btn" id="edit-profile">Changed Your Name?</button>
  </div>

  <div class="section">
    <h3>Profile Information</h3>
    <p class="info-row"><strong>Email:</strong> <span id="acc-email"></span></p>
  </div>

  <div class="section">
    <h3>Security</h3>
    <button class="btn btn-edit" id="change-password">Change Password</button>
  </div>

  <div class="section">
    <h3>Your Upcoming Events</h3>
    <div class="events-list" id="upcoming-events">
      <p>No upcoming events</p>
    </div>
  </div>

  <div class="section">
    <h3>Your Past Events</h3>
    <div class="events-list" id="past-events">
      <p>No past events</p>
    </div>
  </div>

  <button class="btn btn-danger" id="delete-account">Delete Account</button>
  <button class="btn btn-logout" id="logout-btn">Sign Out</button>

</div>

<!-- PASSWORD MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Change Password</h3>

    <input type="password" id="old-pass" placeholder="Current password">
    <input type="password" id="new-pass" placeholder="New password">
    <input type="password" id="confirm-pass" placeholder="Confirm new password">

    <button class="btn btn-edit" id="save-pass">Save</button>
    <button class="btn btn-danger" id="close-modal">Cancel</button>
  </div>
</div>

<!-- DELETE ACCOUNT MODAL -->
<div class="modal-bg" id="delete-modal">
  <div class="modal">
    <h3>Confirm Account Deletion</h3>
    <p style="margin-bottom:10px;">Enter your password to continue</p>

    <input type="password" id="delete-pass" placeholder="Password">

    <button class="btn btn-danger" id="confirm-delete">Delete Account</button>
    <button class="btn btn-edit" id="cancel-delete">Cancel</button>
  </div>
</div>

<script src="auth.js"></script>

<script>
  const user = JSON.parse(localStorage.getItem("planova_user"));
  if (!user) window.location.href = "signin.html";

  document.getElementById("acc-name").textContent = user.name;
  document.getElementById("acc-email").textContent = user.email;

  document.getElementById("avatar").textContent =
    user.name.split(" ").map(n => n[0]).join("").toUpperCase();

  document.getElementById("logout-btn").onclick = () => {
    localStorage.removeItem("planova_user");
    window.location.href = "index.html";
  };

  document.getElementById("edit-profile").onclick = () => {
    const newName = prompt("Enter new name:", user.name);
    if (newName) {
      user.name = newName;
      localStorage.setItem("planova_user", JSON.stringify(user));
      document.getElementById("acc-name").textContent = newName;
      document.getElementById("avatar").textContent =
        newName.split(" ").map(n => n[0]).join("").toUpperCase();
    }
  };

  /* PASSWORD MODAL */
  const modal = document.getElementById("modal-bg");

  document.getElementById("change-password").onclick = () => {
    modal.style.display = "flex";
  };

  document.getElementById("close-modal").onclick = () => {
    modal.style.display = "none";
  };

  document.getElementById("save-pass").onclick = async () => {
    const oldPass = document.getElementById("old-pass").value;
    const newPass = document.getElementById("new-pass").value;
    const confirmPass = document.getElementById("confirm-pass").value;

    if (!oldPass || !newPass || !confirmPass) {
      alert("Please fill in all fields");
      return;
    }

    if (newPass !== confirmPass) {
      alert("New passwords do not match");
      return;
    }

    const res = await fetch("http://127.0.0.1:5000/change-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: user.email,
        old_password: oldPass,
        new_password: newPass
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message);
      return;
    }

    alert("Password updated successfully");
    modal.style.display = "none";
  };

  /* DELETE ACCOUNT MODAL */
  const deleteModal = document.getElementById("delete-modal");

  document.getElementById("delete-account").onclick = () => {
    deleteModal.style.display = "flex";
  };

  document.getElementById("cancel-delete").onclick = () => {
    deleteModal.style.display = "none";
  };

  document.getElementById("confirm-delete").onclick = async () => {
    const password = document.getElementById("delete-pass").value;

    if (!password) {
      alert("Please enter your password");
      return;
    }

    const res = await fetch("http://127.0.0.1:5000/delete-account", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: user.email,
        password: password
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.message);
      return;
    }

    localStorage.removeItem("planova_user");
    alert("Your account has been deleted");
    window.location.href = "index.html";
  };
</script>

</body>
</html>
