<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PLANOVA – Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
}

.auth-container {
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.auth-box {
  width: 420px;
  background: #111;
  border: 1px solid #1f1f1f;
  border-radius: 14px;
  padding: 30px;
  box-shadow: 0 0 20px rgba(0,255,136,0.08);
}

h2 { margin-bottom: 5px; }

.muted {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 20px;
}

label {
  font-size: 13px;
  color: #bbb;
  display: block;
  margin-top: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: white;
  border-radius: 8px;
  outline: none;
}

input:focus {
  border-color: #00ff88;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #00ff88;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.verify-status {
  font-size: 13px;
  margin-top: 10px;
  min-height: 18px;
}

.verify-status.success { color: #00ff88; }
.verify-status.error { color: #ff4d4d; }

.code-box {
  margin-top: 15px;
}

.code-box input {
  text-align: center;
  letter-spacing: 6px;
  font-size: 18px;
  font-weight: bold;
}

.strength-bar {
  width: 100%;
  height: 7px;
  background: #222;
  border-radius: 5px;
  margin-top: 10px;
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  width: 0%;
  background: red;
  transition: 0.3s;
}

.password-rules span {
  display: block;
  font-size: 12px;
  margin-top: 4px;
  color: #ff4d4d;
}

.password-rules span.valid {
  color: #00ff88;
}

.terms {
  font-size: 11px;
  opacity: 0.7;
  text-align: center;
  margin-top: 15px;
}
  </style>
</head>
<body>

<header class="nav">
  <div class="nav-left">
    <a href="index.html" class="logo">
      <span class="logo-mark">●</span> PLANOVA
    </a>
  </div>

  <div class="nav-right"></div>
</header>

<section class="auth-container">
  <div class="auth-box">
    <h2>Sign In</h2>
    <p class="muted">Welcome back to PLANOVA</p>

    <form id="signin-form">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@example.com" required />

      <label>Password</label>
      <div class="password-field">
        <input type="password" id="signin-password" placeholder="••••••••" required />
        <button type="button" class="toggle-password">👁</button>
      </div>

      <button class="btn-primary full-width" type="submit">Sign In</button>
    </form>

    <p class="auth-switch">
      Don’t have an account? <a href="register.html">Register</a>
    </p>
  </div>
</section>

<script src="auth.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const existingUser = JSON.parse(localStorage.getItem("planova_user"));
  if (existingUser) {
    window.location.href = "index.html";
  }

  // Password toggle
  document.querySelectorAll(".toggle-password").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = btn.previousElementSibling;
      input.type = input.type === "password" ? "text" : "password";
    });
  });

  // Sign In handler
  const form = document.getElementById("signin-form");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("signin-email").value;
    const password = document.getElementById("signin-password").value;

    try {
      const res = await fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem("planova_user", JSON.stringify({
          name: data.full_name,
          email: email
        }));

        window.location.href = "index.html";
      } else {
        alert(data.message);
      }
    } catch (err) {
      alert("Unable to connect to server. Make sure your backend is running.");
    }
  });

});

document.querySelectorAll(".toggle-password").forEach(btn => {
  btn.addEventListener("click", () => {
    const input = btn.previousElementSibling;
    input.type = input.type === "password" ? "text" : "password";
  });
});

</script>


</body>
</html>
