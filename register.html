<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PLANOVA – Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
}

.auth-container {
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.auth-box {
  width: 420px;
  background: #111;
  border: 1px solid #1f1f1f;
  border-radius: 14px;
  padding: 30px;
  box-shadow: 0 0 20px rgba(0,255,136,0.08);
}

h2 { margin-bottom: 5px; }

.muted {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 20px;
}

label {
  font-size: 13px;
  color: #bbb;
  display: block;
  margin-top: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: white;
  border-radius: 8px;
  outline: none;
}

input:focus {
  border-color: #00ff88;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #00ff88;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.verify-status {
  font-size: 13px;
  margin-top: -5px;
  margin-left: 115px;
  min-height: 18px;
}

.verify-status.success { color: #00ff88; }
.verify-status.error { color: #ff4d4d; }

.code-box {
  margin-top: -44px;
}

.code-box input {
  text-align: center;
  letter-spacing: 6px;
  font-size: 18px;
  font-weight: bold;
}

.strength-bar {
  width: 100%;
  height: 7px;
  background: #222;
  border-radius: 5px;
  margin-top: 1px;
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  width: 0%;
  background: red;
  transition: 0.3s;
}

.password-rules span {
  display: block;
  font-size: 12px;
  margin-top: 0px;
  color: #b9b9b9;
}

.password-rules span.valid {
  color: #00ff88;
}

.terms {
  font-size: 11px;
  opacity: 0.7;
  text-align: center;
  margin-top: 0px;
  text-decoration: none;
  color: white;
}
.terms-btn {
color: white;
font-size: 14px;
  }


</style>
</head>

<body>
<header class="nav">
  <div class="nav-left">
    <a href="index.html" class="logo">
      <span class="logo-mark">●</span> PLANOVA
    </a>
  </div>

  <div class="nav-right"></div>
</header>
<section class="auth-container">
  <div class="auth-box">

    <h2>Create account</h2>
    <p class="muted">Verify your email to continue</p>

    <form id="register-form">

      <input type="text" id="full_name" placeholder="Full Name" />

      <input type="email" id="email" placeholder="Email" />

      <button type="button" class="btn-primary" id="sendCodeBtn">
        Send Verification Code
      </button>

      <div class="verify-status" id="statusMsg"></div>

      <!-- CODE INPUT -->
      <div class="code-box">
        <label>Verification Code</label>
        <input type="text" id="codeInput" maxlength="6" placeholder="••••••" />
      </div>

      <div class="password-field">
        <input type="password" id="password" placeholder="Password" required />
        <button type="button" class="toggle-password">👁</button>
      </div>
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill"></div>
      </div>

      <div class="password-rules">
        <span>• 12–60 characters</span>
        <span>• lowercase letter</span>
        <span>• uppercase letter</span>
        <span>• number or special character</span>
      </div>

      <div class="terms">
  By signing up you agree to PLANOVA  
  <a href="legal.html" class="terms-btn">Terms & Conditions</a>
</div>

      <button class="btn-primary" type="submit" id="registerBtn" disabled>
        Register
      </button>
<p class="auth-switch">
      Already have an account? <a href="signin.html">Sign In</a>
    </p>
    </form>
  </div>
</section>

<script>

  document.querySelectorAll(".toggle-password").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = btn.previousElementSibling;
      input.type = input.type === "password" ? "text" : "password";
    });
  });

let emailVerified = false;

const statusMsg = document.getElementById("statusMsg");
const registerBtn = document.getElementById("registerBtn");

// 🌐 IMPORTANT: use your deployed backend
const BACKEND_URL = "https://planova-lwj9.onrender.com";

// ---------------- SEND CODE ----------------
document.getElementById("sendCodeBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;

  if (!email) {
    statusMsg.textContent = "Enter your email first";
    statusMsg.className = "verify-status error";
    return;
  }

  try {
    // Wake backend (Render cold start fix)
    await fetch(BACKEND_URL + "/wakeup");

    const res = await fetch(BACKEND_URL + "/send_code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success) {
      statusMsg.textContent = "Verification code sent!";
      statusMsg.className = "verify-status success";
    } else {
      statusMsg.textContent = data.message;
      statusMsg.className = "verify-status error";
    }

  } catch (err) {
    statusMsg.textContent = "Network error. Try again.";
    statusMsg.className = "verify-status error";
  }
});

// ---------------- VERIFY CODE ----------------
document.getElementById("codeInput").addEventListener("input", async () => {
  const code = document.getElementById("codeInput").value.trim();
  const email = document.getElementById("email").value;

  if (code.length !== 6) return;

  try {
    const res = await fetch(BACKEND_URL + "/verify_code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, code })
    });

    const data = await res.json();

    if (data.success) {
      emailVerified = true;
      registerBtn.disabled = false;

      statusMsg.textContent = "Email verified successfully!";
      statusMsg.className = "verify-status success";
    } else {
      emailVerified = false;
      registerBtn.disabled = true;

      statusMsg.textContent = data.message;
      statusMsg.className = "verify-status error";
    }

  } catch (err) {
    statusMsg.textContent = "Verification failed. Try again.";
    statusMsg.className = "verify-status error";
  }
});

// ---------------- PASSWORD STRENGTH ----------------
const pwd = document.getElementById("password");
const fill = document.getElementById("strength-fill");

pwd.addEventListener("input", () => {
  const v = pwd.value;

  const rules = [
    v.length >= 12 && v.length <= 60,
    /[a-z]/.test(v),
    /[A-Z]/.test(v),
    /[0-9!@#$%^&*]/.test(v)
  ];

  let score = rules.filter(Boolean).length;

  fill.style.width = (score * 25) + "%";
  fill.style.background =
    score === 4 ? "#00ff88" :
    score === 3 ? "#ffcc00" :
    score === 2 ? "orange" : "red";
});

// ---------------- REGISTER ----------------
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!emailVerified) return;

  const full_name = document.getElementById("full_name").value;
  const email = document.getElementById("email").value;
  const password = pwd.value;
  const code = document.getElementById("codeInput").value.trim();

  try {
    const res = await fetch(BACKEND_URL + "/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ full_name, email, password, code })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("planova_user", JSON.stringify({ name: full_name, email }));
      window.location.href = "index.html";
    } else {
      statusMsg.textContent = data.message;
      statusMsg.className = "verify-status error";
    }

  } catch (err) {
    statusMsg.textContent = "Registration failed. Try again.";
    statusMsg.className = "verify-status error";
  }
});

</script>

</body>
</html>
